

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful — LaunchPad Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Caveat:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sun: #FFB830;
      --leaf: #3DAA6B;
      --blush: #FF6B6B;
      --cream: #FFFBF3;
      --ink: #2D2416;
      --soft: #F5EED8;
      --muted: #9A8C74;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Confetti canvas */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: #fff;
      border-radius: 32px;
      border: 3px solid var(--soft);
      padding: 52px 44px 44px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 60px rgba(45,36,22,0.10);
      animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85) translateY(24px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .emoji-ring {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: linear-gradient(135deg, #EAF6EF 0%, #FFF8E6 100%);
      border: 4px solid var(--soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.6rem;
      margin: 0 auto 22px;
      animation: wiggle 1.2s ease 0.7s both;
    }

    @keyframes wiggle {
      0%   { transform: rotate(0deg); }
      20%  { transform: rotate(-12deg); }
      40%  { transform: rotate(12deg); }
      60%  { transform: rotate(-7deg); }
      80%  { transform: rotate(7deg); }
      100% { transform: rotate(0deg); }
    }

    h1 {
      font-family: 'Caveat', cursive;
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--leaf);
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 28px;
      max-width: 340px;
      margin-left: auto;
      margin-right: auto;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: var(--sun);
      border-radius: 4px;
      margin: 0 auto 28px;
    }

    /* WhatsApp button */
    .wsp-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      background: #25D366;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      padding: 20px 32px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 5px 0 #1aaa52;
      transition: transform 0.2s, box-shadow 0.2s;
      animation: pulseGlow 2s ease-in-out 1.4s infinite;
    }
    .wsp-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 0 #1aaa52;
      animation: none;
    }
    .wsp-btn:active {
      transform: translateY(1px);
      box-shadow: 0 2px 0 #1aaa52;
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 5px 0 #1aaa52, 0 0 0 0 rgba(37,211,102,0.3); }
      50%       { box-shadow: 0 5px 0 #1aaa52, 0 0 0 10px rgba(37,211,102,0); }
    }

    .countdown-row {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 700;
    }
    .countdown-row span {
      color: var(--blush);
      font-family: 'Caveat', cursive;
      font-size: 1.15rem;
    }

    .brand {
      margin-top: 32px;
      padding-top: 22px;
      border-top: 2px solid var(--soft);
      font-family: 'Caveat', cursive;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--ink);
    }
    .brand em { color: var(--blush); font-style: normal; }

    @media (max-width: 480px) {
      .card { padding: 40px 24px 36px; }
      h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="card">
  <div class="emoji-ring">🎉</div>

  <h1>Payment received!</h1>
  <div class="divider"></div>

  <p class="subtitle">
    Thank you — your order is confirmed! 🙌<br/>
    Please tap below so we can link your payment to your account and get things rolling right away.
  </p>

  <a id="wsp-link"
     href="https://wa.me/27689124033?text=Hi%21%20I%27ve%20just%20completed%20my%20payment%20for%20the%20LaunchPad%20Studio%20package.%20Please%20confirm%20my%20account%20%F0%9F%99%8F"
     target="_blank"
     class="wsp-btn">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
    Confirm my account on WhatsApp
  </a>

  <p class="countdown-row">Opening WhatsApp automatically in <span id="timer">5</span>s…</p>

  <div class="brand">Launch<em>Pad</em> Studio</div>
</div>

<!-- Confetti -->
<script>
  // Auto-redirect countdown
  var seconds = 5;
  var timerEl = document.getElementById('timer');
  var wspLink = document.getElementById('wsp-link').href;

  var countdown = setInterval(function() {
    seconds--;
    timerEl.textContent = seconds;
    if (seconds <= 0) {
      clearInterval(countdown);
      window.location.href = wspLink;
    }
  }, 1000);

  // Confetti
  (function() {
    var canvas = document.getElementById('confetti-canvas');
    var ctx = canvas.getContext('2d');
    var W, H, pieces = [];
    var colors = ['#FFB830','#FF6B6B','#3DAA6B','#2F86C2','#fff','#F5EED8'];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function rand(a, b) { return Math.random() * (b - a) + a; }

    for (var i = 0; i < 120; i++) {
      pieces.push({
        x: rand(0, window.innerWidth),
        y: rand(-200, -10),
        w: rand(8, 16),
        h: rand(6, 12),
        r: rand(0, Math.PI * 2),
        dr: rand(-0.08, 0.08),
        vx: rand(-1.5, 1.5),
        vy: rand(2, 5),
        color: colors[Math.floor(rand(0, colors.length))],
        opacity: rand(0.7, 1)
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      pieces.forEach(function(p) {
        ctx.save();
        ctx.globalAlpha = p.opacity;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.r);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();

        p.x += p.vx;
        p.y += p.vy;
        p.r += p.dr;
        p.vy += 0.04; // gravity

        if (p.y > H + 20) {
          p.y = rand(-100, -10);
          p.x = rand(0, W);
          p.vy = rand(2, 5);
        }
      });
      requestAnimationFrame(draw);
    }
    draw();
  })();
</script>

</body>
</html>
